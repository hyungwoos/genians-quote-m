        input, select, textarea { width: 100%; border: none; outline: none; font-family: inherit; font-size: inherit; background: transparent; padding: 2px; }

        .logo-box { position: absolute; top: 15mm; left: 15mm; }

        .info-section { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 12px; }

        .info-left .input-line { border-bottom: 1px solid #aaa; border-radius: 0; padding-left: 5px; }

<script>
    window.lastAutoRemarks = "";

    function normalizePdfCloneForCanvas(clonedDoc) {
        const clonedPage = clonedDoc.querySelector('.page');
        if (!clonedPage) return;

        clonedDoc.body.classList.add('force-print-layout');

        const makeStaticText = (el, text, align) => {
            const div = clonedDoc.createElement('div');
            div.className = 'pdf-static-field';
            if (align === 'right') div.style.textAlign = 'right';
            else if (align === 'center') div.style.textAlign = 'center';
            else div.style.textAlign = getComputedStyle(el).textAlign || 'left';

            div.textContent = text || '';

            const cs = getComputedStyle(el);
            div.style.fontSize = cs.fontSize;
            div.style.fontWeight = cs.fontWeight;
            div.style.letterSpacing = cs.letterSpacing;
            div.style.color = cs.color;
            div.style.minHeight = Math.max(el.offsetHeight || 20, 22) + 'px';
            div.style.lineHeight = '1.75';
            div.style.paddingBottom = '4px';
            div.style.overflow = 'visible';

            return div;
        };

        // 중요: 서비스/계약기간/납부주기/담당자 선택값은 이미 .print-text 또는 .only-print 영역에 들어가 있습니다.
        // 따라서 select(.no-print)를 다시 텍스트로 변환하면 PDF에서 같은 값이 두 번 출력됩니다.
        clonedPage.querySelectorAll('.no-print, select').forEach(el => {
            el.remove();
        });

        clonedPage.querySelectorAll('input').forEach(input => {
            let text = input.value || '';
            if (input.type === 'date' && text) {
                text = text.replace(/-/g, '.');
            }

            const parent = input.parentElement;
            let align = 'left';
            if (input.classList.contains('input-num') || input.classList.contains('text-right')) align = 'right';
            if (parent && parent.tagName === 'TD' && parent.style.textAlign === 'center') align = 'center';

            const div = makeStaticText(input, text, align);
            if (input.id === 'customerName') {
                div.style.fontSize = '20px';
                div.style.fontWeight = '900';
                div.style.borderBottom = '2px solid #000';
            }
            input.replaceWith(div);
        });

        clonedPage.querySelectorAll('textarea').forEach(textarea => {
            const div = makeStaticText(textarea, textarea.value || '', 'left');
            div.style.minHeight = Math.max(textarea.scrollHeight || 80, 80) + 'px';
            textarea.replaceWith(div);
        });

        // .print-text는 행 선택값 출력용이므로 유지합니다.
        clonedPage.querySelectorAll('.print-text').forEach(el => {
            el.style.display = 'block';
            el.style.visibility = 'visible';
            el.style.lineHeight = '1.6';
            el.style.minHeight = '18px';
            el.style.overflow = 'visible';
        });

        clonedPage.querySelectorAll('td, th, div, span').forEach(el => {
            el.style.overflow = 'visible';
            el.style.lineHeight = el.classList.contains('doc-title') ? '1.2' : '1.6';
        });
    }

    async function prepareAndPrint() {
        calcAll();

        const customer = document.getElementById('customerName').value || "고객사명";
        const qDate = document.getElementById('quoteDate').value || "날짜미입력";
        
        const firstRow = document.querySelector('#itemTable tbody tr');
        let prodLabel = "견적서비스";
        let qty = "0";
        let unit = "User";

        if (firstRow) {
            const prodValue = firstRow.querySelector('.product-sel').value;
            const qtyValue = firstRow.querySelector('.qty').value;
            qty = qtyValue || "0";

            if (prodValue === "direct") {
                const customProd = firstRow.querySelector('.product-custom').value;
                prodLabel = customProd || "직접입력_견적";
            } else if (prodValue.includes("MDR") || prodValue.includes("AV") || prodValue.includes("Ransomware") || prodValue.includes("Device")) {
                prodLabel = "Genian MDR(서비스형)";
                unit = "User";
            } else if (prodValue.includes("NAC") || prodValue.includes("ZTNA")) {
                prodLabel = prodValue.includes("NAC") ? "Genian Cloud NAC(서비스형)" : "Genian Cloud ZTNA(서비스형)";
                unit = "Node";
            } else {
                prodLabel = prodValue || "견적서비스";
            }
        }

        const fileName = `${qDate}_${customer}_${prodLabel}_${qty}${unit}_견적서(지니언스).pdf`;
        const page = document.querySelector('.page');
        const btn = document.querySelector('.btn-print');
        const originalBtnText = btn ? btn.innerText : "";

        try {
            if (!window.html2canvas || !window.jspdf) {
                alert('PDF 생성 라이브러리를 불러오지 못했습니다. 네트워크 상태를 확인 후 다시 시도해주세요.');
                return;
            }

            if (btn) {
                btn.disabled = true;
                btn.innerText = "PDF 생성 중...";
            }

            document.body.classList.add('force-print-layout');

            // 모바일 브라우저에서 CSS 반영과 폰트/이미지 로딩을 기다림
            if (document.fonts && document.fonts.ready) {
                await document.fonts.ready;
            }

            await Promise.all(Array.from(document.images).map(img => {
                if (img.complete) return Promise.resolve();
                return new Promise(resolve => {
                    img.onload = resolve;
                    img.onerror = resolve;
                });
            }));

            await new Promise(resolve => setTimeout(resolve, 300));

            const canvas = await html2canvas(page, {
                scale: 3,
                useCORS: true,
                allowTaint: true,
                backgroundColor: '#ffffff',
                windowWidth: 1200,
                scrollX: 0,
                scrollY: 0,
                onclone: function(clonedDoc) {
                    normalizePdfCloneForCanvas(clonedDoc);
                }
            });

            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({
                orientation: 'portrait',
                unit: 'mm',
                format: 'a4',
                compress: false
            });

            const pageWidth = 210;
            const pageHeight = 297;
            let imgWidth = pageWidth;
            let imgHeight = (canvas.height * imgWidth) / canvas.width;
            let x = 0;
            let y = 0;

            // 내용이 A4 높이를 넘으면 1장에 맞게 자동 축소
            if (imgHeight > pageHeight) {
                imgHeight = pageHeight;
                imgWidth = (canvas.width * imgHeight) / canvas.height;
                x = (pageWidth - imgWidth) / 2;
            }

            pdf.addImage(imgData, 'PNG', x, y, imgWidth, imgHeight);
            pdf.save(fileName);
        } catch (e) {
            console.error(e);
            alert('PDF 생성 중 오류가 발생했습니다. 다시 시도해주세요.');
        } finally {
            document.body.classList.remove('force-print-layout');
            if (btn) {
                btn.disabled = false;
                btn.innerText = originalBtnText;
            }
        }
    }

    function updateQuoteMessage() {
        const firstRowSel = document.querySelector('#itemTable tbody tr:first-child .product-sel');
        const msgDiv = document.getElementById('quoteMessage');
        
        if (!firstRowSel || !firstRowSel.value) {
            msgDiv.innerText = "";
            return;

    function updateRemarksText() {
        let hasMDR = false, mdrCycle = "";
        let hasNAC = false, nacCycle = "";
        let hasPA = false, paCycle = "";

        const rows = document.querySelectorAll('#itemTable tbody tr');
        rows.forEach(tr => {
            const prod = tr.querySelector('.product-sel').value;
            if (!prod || prod === "direct") return; 
            
            const billing = tr.querySelector('.billing-sel').value;
            if (!billing) return; // 납부 주기가 선택되지 않으면 비고란 자동생성 보류

            let cycleStr = "연";
            if (billing === "1") cycleStr = "월";
            else if (billing === "lump") cycleStr = "일시납";

            if (prod.includes("MDR") || prod.includes("AV") || prod.includes("Ransomware") || prod.includes("Device")) {
                hasMDR = true; mdrCycle = cycleStr;
            } else if (prod.includes("NAC")) {
                hasNAC = true; nacCycle = cycleStr;
            } else if (prod.includes("ZTNA") || prod.includes("PA")) {
                hasPA = true; paCycle = cycleStr;
            }
        });

        let parts = [];

        // 일시납 여부에 따른 출력 문구 함수
        const getMethodStr = (cycle) => cycle === "일시납" ? "- 약정 일시납 조건" : `- ${cycle} 구독 서비스 방식`;

        if (hasMDR) {
            parts.push(`[Genian MDR]\n${getMethodStr(mdrCycle)}\n- 관제/대응/분석/조치 모두 포함\n- 별도 추가 과금 없음`);
        }
        
        if (hasNAC && hasPA) {
            parts.push(`[Cloud ZTNA]\n${getMethodStr(nacCycle)}\n- 네트워크 구성에 따라 장비 및 수량이 변경 될 수 있습니다.\n- 구축/기술지원/유지보수 모두 포함\n- PA 라이선스는 SSL VPN 동시 접속자 기준`);
        } else if (hasNAC) { 
            parts.push(`[Cloud NAC]\n${getMethodStr(nacCycle)}\n- 네트워크 구성에 따라 장비 및 수량이 변경 될 수 있습니다.\n- 구축/기술지원/유지보수 모두 포함\n- 별도 추가 과금 없음`);
        } else if (hasPA) { 
            parts.push(`[Cloud ZTNA (PA)]\n${getMethodStr(paCycle)}\n- 네트워크 구성에 따라 장비 및 수량이 변경 될 수 있습니다.\n- 구축/기술지원/유지보수 모두 포함\n- 별도 추가 과금 없음`);
        }

        const autoStr = parts.join('\n\n');
        const textarea = document.querySelector('.remarks-section textarea');
        
        if (textarea.value.trim() === "" || textarea.value === window.lastAutoRemarks) {
            textarea.value = autoStr;
            window.lastAutoRemarks = autoStr;
            
            textarea.style.height = "auto";
            if(autoStr !== "") {
                textarea.style.height = (textarea.scrollHeight + 5) + "px";
            } else {
                textarea.style.height = "120px";
            }
        }
    }

    function updateOptions(selectElem) {
        const tr = selectElem.closest('tr');
        const termSel = tr.querySelector('.term-sel');
        const qtyInput = tr.querySelector('.qty');
        const prodName = selectElem.value;
        
        const prodCustom = tr.querySelector('.product-custom');
        const termCustom = tr.querySelector('.term-custom');
        const consumerPrice = tr.querySelector('.consumer-price');

        termSel.innerHTML = '<option value="">-- 계약 기간 --</option>';

        if (prodName === 'direct') {
            selectElem.style.display = 'none'; 
            prodCustom.style.display = 'block';
            
            termSel.style.display = 'none';
            termCustom.style.display = 'block';
            
            qtyInput.style.display = 'inline-block';
            
            consumerPrice.removeAttribute('readonly');
            consumerPrice.placeholder = "단가 직접입력";
            
            consumerPrice.value = "";
            tr.querySelector('.proposed-price').value = "";
            tr.querySelector('.row-total').value = "";
            tr.querySelector('.row-vat').value = "";
            calcAll();
            return;
        }

        if(!prodName) {
            qtyInput.style.display = 'none';
            consumerPrice.value = "";
            tr.querySelector('.proposed-price').value = "";
            tr.querySelector('.row-total').value = "";
            tr.querySelector('.row-vat').value = "";
            calcAll();
            return;
        } else {
            qtyInput.style.display = 'inline-block';
        }

        const conditions = Object.keys(pricingDB[prodName].tiers[0].prices);
        conditions.forEach(cond => {
            termSel.innerHTML += `<option value="${cond}">${cond}</option>`;
        });

        if (conditions.length > 0) {
            termSel.value = conditions[0];
        }

        calcAll();
    }

    function formatCurrency(input) {
        let val = input.value.replace(/[^0-9]/g, '');
        if(val) { input.value = parseInt(val).toLocaleString(); } 
        else { input.value = ''; }
        calcAll();
    }

    function calcAll() {
        let grandVal = 0, grandVat = 0;
        const rows = document.querySelectorAll('#itemTable tbody tr');

        rows.forEach(tr => {
            const prodSel = tr.querySelector('.product-sel');
            const prodName = prodSel.value;
            const term = tr.querySelector('.term-sel').value;
            
            const billingVal = tr.querySelector('.billing-sel').value;
            const isLumpSum = (billingVal === 'lump');
            const billingMulti = parseInt(billingVal) || 1; // 연납, 월납 곱하기용
            
            const qty = parseInt(tr.querySelector('.qty').value) || 0;
            
            const proposedInput = tr.querySelector('.proposed-price').value.replace(/,/g, '');
            const proposedPrice = parseInt(proposedInput) || 0;

            let consumerPrice = 0;

            if (prodName === 'direct') {
                const cPriceInput = tr.querySelector('.consumer-price').value.replace(/,/g, '');
                consumerPrice = parseInt(cPriceInput) || 0;
            // 모든 필수 항목(서비스, 기간, 납부주기)이 선택되어야만 금액을 계산함
            } else if (prodName && term && billingVal !== "" && qty > 0) {
                const db = pricingDB[prodName];
                
                let tier = db.tiers.find(t => qty <= t.max);
                if(!tier) tier = db.tiers[db.tiers.length - 1];

                let basePrice = tier.prices[term] || 0;

                // 일시납인 경우 계약 약정 기간만큼 계산
                if (isLumpSum) {
                    let years = 1; // 무약정 및 1년약정의 기본값
                    if (term.includes('2년')) years = 2;
                    else if (term.includes('3년')) years = 3;
                    else if (term.includes('4년')) years = 4;
                    else if (term.includes('5년')) years = 5;

                    if (db.type === "monthly") {
                        if (term === '무약정') {
                            basePrice *= 1; // 월단위 무약정의 일시납은 기본 1개월로 반영
                        } else {
                            basePrice *= (years * 12);
                        }
                    } else if (db.type === "yearly") {
                        basePrice *= years;
                    }
                } else {
                    // 기존 연납 / 월납 로직
                    if(db.type === "monthly" && billingMulti === 12) basePrice *= 12;
                    if(db.type === "yearly" && billingMulti === 1) basePrice = Math.floor(basePrice / 12);
                }

                consumerPrice = basePrice;
            }

            const subTotal = proposedPrice * qty;
            const vat = Math.floor(subTotal * 0.1);

            if(prodName === 'direct') {
                if(consumerPrice > 0) {
                    tr.querySelector('.consumer-price').value = consumerPrice.toLocaleString();
                }
                tr.querySelector('.row-total').value = subTotal ? subTotal.toLocaleString() : "";
                tr.querySelector('.row-vat').value = vat ? vat.toLocaleString() : "";
            } else if(prodName) {
                tr.querySelector('.consumer-price').value = consumerPrice ? consumerPrice.toLocaleString() : "";
                tr.querySelector('.row-total').value = subTotal ? subTotal.toLocaleString() : "";
                tr.querySelector('.row-vat').value = vat ? vat.toLocaleString() : "";
            }

            const prodPrint = prodSel.parentElement.querySelector('.print-text');
            if (prodSel.value === 'direct') {
                prodPrint.innerText = tr.querySelector('.product-custom').value;
            } else if (prodSel.selectedIndex > 0) {
                prodPrint.innerText = prodSel.options[prodSel.selectedIndex].text;
            } else {
                prodPrint.innerText = "";
            }

            const termSel = tr.querySelector('.term-sel');
            const termPrint = termSel.parentElement.querySelector('.print-text');
            if (prodSel.value === 'direct') {
                termPrint.innerText = tr.querySelector('.term-custom').value;
            } else if (termSel.selectedIndex > 0) {
                termPrint.innerText = termSel.options[termSel.selectedIndex].text;
            } else {
                termPrint.innerText = "";
            }

            const billSel = tr.querySelector('.billing-sel');
            const billPrint = billSel.parentElement.querySelector('.print-text');
            if (billSel.value !== "" && billSel.selectedIndex >= 0) {
                billPrint.innerText = billSel.options[billSel.selectedIndex].text;
            } else {
                billPrint.innerText = "";
            }

            grandVal += subTotal;
            grandVat += vat;
        });

        const totalAmt = grandVal + grandVat;
        document.getElementById('numGrandTotal').innerText = totalAmt.toLocaleString();
        document.getElementById('txtGrandTotal').innerText = amtToKor(totalAmt);
        
        updateQuoteMessage(); 
        updateRemarksText(); 
    }

    function amtToKor(num) {
        if(num === 0) return "영";
        const kor = ["", "일", "이", "삼", "사", "오", "육", "칠", "팔", "구"];
        const unit = ["", "십", "백", "천"];
        const bigUnit = ["", "만", "억", "조"];
        let res = "", i = 0, n = num;
        while (n > 0) {
            let m = n % 10000, s = "", j = 0;
            while (m > 0) {
                let d = m % 10;
                if (d > 0) s = kor[d] + unit[j] + s;
                m = Math.floor(m / 10); j++;
            }
            if (s !== "") res = s + bigUnit[i] + res;
            n = Math.floor(n / 10000); i++;
        }
        return res;
    }
</script>
