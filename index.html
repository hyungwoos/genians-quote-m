<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Genians 공식 자동 견적 시스템 v2.6 Mobile</title>
    <style>

        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

        :root { --genians-green: #1fb53a; --border-color: #000; --gray-bg: #f8f9fa; }
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

        html, body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            background: #f2f4f6;
            color: #222;
        }

        body {
            padding: 0;
        }

        .toolbar {
            position: sticky;
            top: 0;
            z-index: 100;
            width: 100%;
            margin: 0;
            padding: 10px;
            background: #fff;
            border-radius: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }

        .toolbar > div:first-child {
            font-size: 13px;
            text-align: center;
            font-weight: bold;
            color: var(--genians-green);
        }

        .toolbar > div:last-child {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn {
            width: 100%;
            padding: 12px 8px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            color: white;
        }

        .btn-print { background: var(--genians-green); }
        .btn-add { background: #343a40; }

        .page {
            width: 100%;
            min-height: auto;
            margin: 0;
            padding: 14px;
            background: #fff;
            box-shadow: none;
            position: relative;
        }

        input, select, textarea {
            width: 100%;
            min-height: 42px;
            border: 1px solid #d8dde3;
            border-radius: 9px;
            outline: none;
            font-family: inherit;
            font-size: 15px;
            background: #fff;
            padding: 9px 10px;
        }

        input[readonly] {
            background: #f7f8fa;
            color: #333;
        }

        select {
            background: #fff;
            font-size: 15px;
        }

        textarea {
            line-height: 1.5;
            resize: none;
            overflow: hidden;
        }

        .logo-box {
            position: relative;
            top: 0;
            left: 0;
            text-align: center;
            margin-bottom: 12px;
        }

        .logo-box img {
            height: 30px;
            object-fit: contain;
        }

        .doc-title {
            margin-top: 0;
            margin-bottom: 18px;
            font-size: 26px;
            font-weight: 900;
            text-align: center;
            letter-spacing: 8px;
            text-decoration: underline;
            text-underline-offset: 7px;
        }

        .info-section {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 16px;
            font-size: 12px;
        }

        .info-left,
        .info-right {
            width: 100%;
        }

        .info-left {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 0;
        }

        .info-left > div {
            display: block !important;
        }

        .info-left span {
            display: block;
            width: auto !important;
            margin-bottom: 5px;
            font-size: 12px;
            color: #555;
            font-weight: bold;
        }

        #customerName {
            height: 44px;
            font-size: 20px !important;
            font-weight: 900 !important;
            border-bottom: 2px solid #000 !important;
            text-align: left !important;
            padding: 0 5px !important;
            border-radius: 0 !important;
        }

        .info-left .input-line {
            border: 1px solid #d8dde3;
            border-radius: 9px;
            padding-left: 10px;
        }

        .info-right table,
        .info-right tbody,
        .info-right tr,
        .info-right th,
        .info-right td {
            display: block;
            width: 100% !important;
        }

        .info-right table {
            border: 1px solid #ddd;
            border-radius: 12px;
            overflow: hidden;
            font-size: 12px;
            background: #fff;
            border-collapse: collapse;
        }

        .info-right tr {
            border-bottom: 1px solid #eee;
        }

        .info-right tr:last-child {
            border-bottom: none;
        }

        .info-right th,
        .info-right td {
            border: none;
            text-align: left;
            padding: 8px 10px;
        }

        .info-right th {
            background: #f7f7f7;
            font-size: 12px;
            font-weight: bold;
        }

        .info-right .provider-title {
            writing-mode: horizontal-tb;
            text-orientation: mixed;
            letter-spacing: 0;
            text-align: center;
            font-weight: 900;
            background: var(--genians-green);
            color: #fff;
        }

        .info-right td[colspan="3"] {
            line-height: 1.4;
        }

        .info-right img[alt="직인"] {
            width: 38px !important;
            right: 10px !important;
        }

        #managerSelect {
            width: 100% !important;
        }

        #quoteMessage {
            font-size: 14px !important;
            line-height: 1.4;
            margin: 12px 0;
            text-align: left;
            font-weight: bold;
            min-height: 22px;
        }

        .table-responsive {
            overflow: visible;
            width: 100%;
        }

        .main-table,
        .main-table thead,
        .main-table tbody,
        .main-table tr,
        .main-table th,
        .main-table td {
            display: block;
            width: 100%;
        }

        .main-table {
            border: none;
            table-layout: auto;
            font-size: 14px;
            border-collapse: collapse;
        }

        .main-table thead {
            display: none;
        }

        .main-table tr {
            position: relative;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .main-table td {
            height: auto;
            min-height: auto;
            border: none;
            padding: 7px 0;
            text-align: left !important;
            vertical-align: top;
        }

        .main-table td::before {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            font-weight: 800;
            color: #555;
        }

        .main-table td:nth-child(1)::before { content: "서비스"; }
        .main-table td:nth-child(2)::before { content: "계약 기간"; }
        .main-table td:nth-child(3)::before { content: "납부 주기"; }
        .main-table td:nth-child(4)::before { content: "소비자 단가"; }
        .main-table td:nth-child(5)::before { content: "수량"; }
        .main-table td:nth-child(6)::before { content: "제안 단가"; }
        .main-table td:nth-child(7)::before { content: "공급 제안가"; }
        .main-table td:nth-child(8)::before { content: "세액"; }
        .main-table td:nth-child(9)::before { content: "비고"; }

        .custom-input {
            width: 100%;
            min-height: 42px;
            border: 1px solid #d8dde3;
            background: #fff;
            border-radius: 9px;
            padding: 9px 10px;
            font-size: 15px;
            box-sizing: border-box;
        }

        .text-right,
        .input-num {
            text-align: right !important;
        }

        .qty {
            width: 100% !important;
        }

        .btn-del {
            position: static !important;
            width: 100% !important;
            height: 36px !important;
            border-radius: 8px !important;
            margin-top: 6px;
            font-size: 13px !important;
            background: #dc3545 !important;
            color: #fff;
            border: none;
            cursor: pointer;
        }

        .btn-del::after {
            content: " 항목 삭제";
        }

        .amount-box {
            position: sticky;
            bottom: 0;
            z-index: 80;
            display: flex;
            flex-direction: column;
            text-align: center;
            gap: 8px;
            margin: 14px -14px 0;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            background: #fff;
            border: 2px solid var(--border-color);
            border-left: none;
            border-right: none;
            border-bottom: none;
            border-radius: 14px 14px 0 0;
            box-shadow: 0 -4px 14px rgba(0,0,0,0.14);
        }

        .amount-box div:last-child {
            color: var(--genians-green);
            font-size: 17px;
            line-height: 1.5;
            word-break: keep-all;
        }

        .remarks-section {
            margin-top: 18px;
            font-size: 12px;
            padding-bottom: 20px;
        }

        .remarks-section table,
        .remarks-section tbody,
        .remarks-section tr,
        .remarks-section td {
            display: block;
            width: 100%;
            border-collapse: collapse;
        }

        .remarks-section td {
            padding: 3px 0;
            vertical-align: middle;
        }

        .remarks-section input[type="text"] {
            margin-bottom: 6px;
            font-size: 15px;
            width: 100%;
            text-align: left;
        }

        .remarks-section textarea {
            min-height: 150px;
            font-size: 15px;
            line-height: 1.5;
        }

        .only-print { display: none; }
        .print-text { display: none; }

        @media print {
            @page { size: A4 portrait; margin: 8mm; }

            html, body {
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                background: #fff !important;
                overflow: visible !important;
            }

            .toolbar,
            .btn-del,
            .no-print {
                display: none !important;
            }

            .only-print,
            .print-text {
                display: block !important;
            }

            .page {
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                box-shadow: none !important;
                background: #fff !important;
            }

            .logo-box {
                text-align: left !important;
                margin-bottom: 8px !important;
            }

            .doc-title {
                font-size: 24px !important;
                margin-bottom: 14px !important;
            }

            input,
            textarea {
                border: none !important;
                background: transparent !important;
                border-radius: 0 !important;
                min-height: 0 !important;
                padding: 2px !important;
                font-size: inherit !important;
            }

            input::placeholder,
            textarea::placeholder {
                color: transparent !important;
            }

            select {
                display: none !important;
            }

            .info-right table {
                border: 1px solid #000 !important;
                border-radius: 0 !important;
            }

            .info-right tr {
                border-bottom: 1px solid #ddd !important;
                page-break-inside: avoid !important;
            }

            .main-table tr {
                box-shadow: none !important;
                border: 1px solid #000 !important;
                page-break-inside: avoid !important;
            }

            .amount-box {
                position: static !important;
                box-shadow: none !important;
                border: 2px solid #000 !important;
                margin: 12px 0 0 !important;
                border-radius: 0 !important;
            }

            .remarks-section textarea {
                border: none !important;
            }
        }


        /* =========================================================
           모바일 PDF 1페이지 출력 보정
           - 모바일 화면은 카드형 유지
           - PDF/인쇄 시 sticky, min-height, overflow로 인한 빈 페이지 증가 방지
        ========================================================= */
        @media print {
            @page { size: A4 portrait; margin: 6mm; }

            html,
            body {
                width: 100% !important;
                height: auto !important;
                min-height: 0 !important;
                margin: 0 !important;
                padding: 0 !important;
                background: #fff !important;
                overflow: visible !important;
            }

            body * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            .toolbar,
            .btn-del,
            .no-print {
                display: none !important;
            }

            .only-print,
            .print-text {
                display: block !important;
            }

            .page {
                width: 100% !important;
                min-width: 0 !important;
                height: auto !important;
                min-height: 0 !important;
                margin: 0 !important;
                padding: 0 !important;
                box-shadow: none !important;
                background: #fff !important;
                overflow: visible !important;
                page-break-after: avoid !important;
                page-break-before: avoid !important;
                page-break-inside: avoid !important;
                break-after: avoid !important;
                break-before: avoid !important;
                break-inside: avoid !important;
            }

            .logo-box {
                position: static !important;
                text-align: left !important;
                margin: 0 0 5px 0 !important;
            }

            .logo-box img {
                height: 22px !important;
            }

            .doc-title {
                font-size: 22px !important;
                letter-spacing: 8px !important;
                margin: 0 0 8px 0 !important;
                text-underline-offset: 5px !important;
            }

            .info-section {
                gap: 6px !important;
                margin-bottom: 8px !important;
                font-size: 9px !important;
            }

            .info-left {
                gap: 4px !important;
                padding-bottom: 0 !important;
            }

            .info-left span {
                font-size: 9px !important;
                margin-bottom: 2px !important;
            }

            #customerName {
                height: auto !important;
                font-size: 14px !important;
                min-height: 0 !important;
            }

            #quoteMessage {
                font-size: 10px !important;
                line-height: 1.25 !important;
                margin: 6px 0 !important;
                min-height: 0 !important;
            }

            input,
            textarea {
                border: none !important;
                background: transparent !important;
                border-radius: 0 !important;
                min-height: 0 !important;
                height: auto !important;
                padding: 1px !important;
                font-size: inherit !important;
                line-height: 1.25 !important;
            }

            input::placeholder,
            textarea::placeholder {
                color: transparent !important;
            }

            select {
                display: none !important;
            }

            .info-right table {
                border: 1px solid #000 !important;
                border-radius: 0 !important;
                overflow: visible !important;
                font-size: 8px !important;
            }

            .info-right tr {
                border-bottom: 1px solid #ddd !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }

            .info-right th,
            .info-right td {
                padding: 3px 4px !important;
                font-size: 8px !important;
                line-height: 1.25 !important;
            }

            .info-right .provider-title {
                font-size: 9px !important;
                padding: 4px !important;
            }

            .main-table {
                font-size: 9px !important;
            }

            .main-table tr {
                box-shadow: none !important;
                border: 1px solid #000 !important;
                border-radius: 8px !important;
                padding: 6px !important;
                margin-bottom: 6px !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }

            .main-table td {
                padding: 3px 0 !important;
                font-size: 9px !important;
                line-height: 1.25 !important;
            }

            .main-table td::before {
                font-size: 8px !important;
                margin-bottom: 1px !important;
            }

            .amount-box {
                position: static !important;
                display: flex !important;
                flex-direction: column !important;
                gap: 3px !important;
                box-shadow: none !important;
                border: 1px solid #000 !important;
                margin: 6px 0 0 !important;
                padding: 6px !important;
                border-radius: 0 !important;
                font-size: 10px !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }

            .amount-box div:last-child {
                font-size: 11px !important;
                line-height: 1.25 !important;
            }

            .remarks-section {
                margin-top: 8px !important;
                font-size: 8px !important;
            }

            .remarks-section table,
            .remarks-section tbody,
            .remarks-section tr,
            .remarks-section td {
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }

            .remarks-section td {
                padding: 1px 0 !important;
            }

            .remarks-section input[type="text"] {
                margin-bottom: 1px !important;
                font-size: 8px !important;
                min-height: 0 !important;
            }

            .remarks-section textarea {
                min-height: 38px !important;
                max-height: 95px !important;
                border: none !important;
                font-size: 8px !important;
                line-height: 1.25 !important;
                overflow: hidden !important;
            }

            table,
            tr,
            td,
            th {
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }
        }

    </style>
</head>
<body>

<div id="loginOverlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #525659; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center;">
    <div style="background: #fff; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center; width: 300px;">
        <img src="Logo.jpg" alt="Genians" style="height: 40px; margin-bottom: 20px;">
        <h3 style="margin: 0 0 20px 0; color: #333;">견적 시스템 접속</h3>
        <input type="password" id="pwInput" placeholder="비밀번호를 입력하세요" onkeypress="if(event.key==='Enter') checkPassword()" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; box-sizing: border-box; text-align: center;">
        <button onclick="checkPassword()" style="width: 100%; padding: 10px; background: var(--genians-green); color: white; border: none; border-radius: 5px; font-weight: bold; font-size: 15px; cursor: pointer;">접 속</button>
    </div>
</div>
<script>
    function checkPassword() {
        const secureKey = "MUdlbmlka3Mh"; 
        const input = document.getElementById('pwInput').value;

        if (btoa(input) === secureKey) {
            document.getElementById('loginOverlay').style.display = 'none';
        } else {
            alert('비밀번호가 일치하지 않습니다.');
            document.getElementById('pwInput').value = '';
            document.getElementById('pwInput').focus();
        }
    }
</script>
<div class="toolbar">
    <div style="font-weight: bold; color: var(--genians-green);">Genians Pricing System v2.6 Mobile</div>
    <div>
        <button class="btn btn-add" onclick="addRow()">+ 항목 추가</button>
        <button class="btn btn-print" onclick="prepareAndPrint()">견적서 발행 (PDF)</button>
    </div>
</div>

<div class="page">
    <div class="logo-box">
        <img src="Logo.jpg" alt="Genians Logo">
    </div>

    <div class="doc-title">견 적 서</div>
    
    <div class="info-section">
        <div class="info-left">
            <div style="font-size: 18px; font-weight: bold; display: flex; align-items: flex-end; margin-bottom: 5px;">
                <input type="text" id="customerName" style="width: 100%; font-size: 20px; font-weight: 900; border-bottom: 2px solid #000; text-align: left; padding: 0 5px;" placeholder="고객사명">
            </div>
            <div style="display: flex; align-items: center;">
                <span style="width: 60px; font-weight: bold;">담당자</span>
                <input type="text" class="input-line" style="flex: 1; margin-right: 5px;" placeholder="담당자 성명 또는 직급을 입력하세요"> <span style="font-size: 16px; font-weight: bold;">귀하</span>
            </div>
            <div style="display: flex; align-items: center;">
                <span style="width: 60px; font-weight: bold;">견적일</span>
                <input type="date" class="input-line" style="flex: 1; font-family: inherit;" id="quoteDate">
            </div>
        </div>
        
        <div class="info-right">
            <table>
                <tr>
                    <th rowspan="4" class="provider-title">공급자</th>
                    <th style="width: 18%;">상호</th>
                    <td style="width: 37%; font-weight: bold;">지니언스 주식회사</td>
                    <th style="width: 15%;">대표</th>
                    <td style="width: 25%; position: relative;">
                        <span style="position: relative; z-index: 2;">이동범</span>
                        <img src="도장.jpg" alt="직인" style="position: absolute; top: 50%; right: -10px; transform: translateY(-50%); width: 40px; mix-blend-mode: multiply; z-index: 1;">
                    </td>
                </tr>
                <tr>
                    <th>주소</th>
                    <td colspan="3" style="text-align: left; padding-left: 10px; line-height: 1.4;">경기도 안양시 동안구 벌말로 66, 평촌역하이필드<br>A동 12층</td>
                </tr>
                <tr>
                    <th>홈페이지</th>
                    <td colspan="3" style="text-align: left; padding-left: 10px;">www.genians.co.kr</td>
                </tr>
                <tr>
                    <th>담당자</th>
                    <td colspan="3" style="border: none; padding: 4px; vertical-align: middle;">
                        <div style="display: flex; flex-direction: column; gap: 4px; width: 100%; padding-left: 5px;">
                            <select id="managerSelect" class="no-print" onchange="updateManagerInfo()" style="width: 90%; border: 1px solid #ccc; text-align: left; padding: 2px;">
                                <option value="">담당자 선택</option>
                                <option value="kholong@genians.com / 010-6305-6392">송기영 부장</option>
                                <option value="choihw@genians.com / 010-7278-4782">최형우 차장</option>
                            </select>
                            <input type="text" id="printManagerName" class="only-print" style="width: 100%; text-align: left; border: none; font-weight: bold;" readonly>
                            <input type="text" id="managerContact" placeholder="이메일 또는 연락처" style="width: 100%; border: none; text-align: left; font-size: 11px;" readonly>
                        </div>
                    </td>
                </tr>
            </table>
        </div>
    </div>
    
    <div id="quoteMessage" style="text-align: left; font-size: 15px; font-weight: bold; margin-bottom: 15px; min-height: 22px;"></div>

    <div class="table-responsive">
        <table class="main-table" id="itemTable">
            <thead>
                <tr>
                    <th style="width: 17%;">서비스</th>
                    <th style="width: 12%;">계약 기간</th>
                    <th style="width: 11%;">납부 주기</th>
                    <th style="width: 11%;">소비자 단가(₩)</th>
                    <th style="width: 8%;">수량</th> 
                    <th style="width: 11%;">제안 단가(₩)</th>

        const firstRow = document.querySelector('#itemTable tbody tr');
        let prodLabel = "견적서";
        let qty = "0";
        let unit = "User";

        if (firstRow) {
            const prodValue = firstRow.querySelector('.product-sel').value;
            const qtyValue = firstRow.querySelector('.qty').value;
            qty = qtyValue || "0";

            if (prodValue === "direct") {
                const customProd = firstRow.querySelector('.product-custom').value;
                prodLabel = customProd || "직접입력_견적";
            } else if (prodValue.includes("MDR") || prodValue.includes("AV") || prodValue.includes("Ransomware") || prodValue.includes("Device")) {
                prodLabel = "Genian MDR(서비스형)";
                unit = "User";
            } else if (prodValue.includes("NAC") || prodValue.includes("ZTNA")) {
                prodLabel = prodValue.includes("NAC") ? "Genian Cloud NAC(서비스형)" : "Genian Cloud ZTNA(서비스형)";
                unit = "Node";
            } else {
                prodLabel = prodValue || "견적서비스";
            }
        }

        const fileName = `${qDate}_${customer}_${prodLabel}_${qty}${unit}_견적서(지니언스)_모바일`;
        const originalTitle = document.title;
        document.title = fileName;

        const clearTitle = function() {
            document.title = originalTitle;
        };

        window.onafterprint = clearTitle;

        setTimeout(function() {
            window.print();
            setTimeout(clearTitle, 1200);
        }, 150);
    }

    function updateRemarksText() {
        let hasMDR = false, mdrCycle = "";
        let hasNAC = false, nacCycle = "";
        let hasPA = false, paCycle = "";

        const rows = document.querySelectorAll('#itemTable tbody tr');
        rows.forEach(tr => {
            const prod = tr.querySelector('.product-sel').value;
            if (!prod || prod === "direct") return; 
            
            const billing = tr.querySelector('.billing-sel').value;
            if (!billing) return; // 납부 주기가 선택되지 않으면 비고란 자동생성 보류

            let cycleStr = "연";
            if (billing === "1") cycleStr = "월";
            else if (billing === "lump") cycleStr = "일시납";

            if (prod.includes("MDR") || prod.includes("AV") || prod.includes("Ransomware") || prod.includes("Device")) {
                hasMDR = true; mdrCycle = cycleStr;
            } else if (prod.includes("NAC")) {
                hasNAC = true; nacCycle = cycleStr;
            } else if (prod.includes("ZTNA") || prod.includes("PA")) {
                hasPA = true; paCycle = cycleStr;
            }
        });

        let parts = [];

        // 일시납 여부에 따른 출력 문구 함수
        const getMethodStr = (cycle) => cycle === "일시납" ? "- 약정 일시납 조건" : `- ${cycle} 구독 서비스 방식`;

        if (hasMDR) {
            parts.push(`[Genian MDR]\n${getMethodStr(mdrCycle)}\n- 관제/대응/분석/조치 모두 포함\n- 별도 추가 과금 없음`);
        }
        
        if (hasNAC && hasPA) {
            parts.push(`[Cloud ZTNA]\n${getMethodStr(nacCycle)}\n- 네트워크 구성에 따라 장비 및 수량이 변경 될 수 있습니다.\n- 구축/기술지원/유지보수 모두 포함\n- PA 라이선스는 SSL VPN 동시 접속자 기준`);
        } else if (hasNAC) { 
            parts.push(`[Cloud NAC]\n${getMethodStr(nacCycle)}\n- 네트워크 구성에 따라 장비 및 수량이 변경 될 수 있습니다.\n- 구축/기술지원/유지보수 모두 포함\n- 별도 추가 과금 없음`);
        } else if (hasPA) { 
            parts.push(`[Cloud ZTNA (PA)]\n${getMethodStr(paCycle)}\n- 네트워크 구성에 따라 장비 및 수량이 변경 될 수 있습니다.\n- 구축/기술지원/유지보수 모두 포함\n- 별도 추가 과금 없음`);
        }

        const autoStr = parts.join('\n\n');
        const textarea = document.querySelector('.remarks-section textarea');
        
        if (textarea.value.trim() === "" || textarea.value === window.lastAutoRemarks) {
            textarea.value = autoStr;
            window.lastAutoRemarks = autoStr;
            
            textarea.style.height = "auto";
            if(autoStr !== "") {
                textarea.style.height = (textarea.scrollHeight + 5) + "px";
            } else {
                textarea.style.height = "120px";
            }
        }
    }

                    <option value="">-- 계약 기간 --</option>
                </select>
                <input type="text" class="term-custom custom-input no-print" style="display:none;" placeholder="기간 직접입력" oninput="calcAll()">
                <div class="print-text"></div>
            </td>
            <td style="vertical-align: middle;">
                <select class="billing-sel no-print" onchange="calcAll()">
                    <option value="">-- 납부 주기 --</option>
                    <option value="lump">일시납</option>
                    <option value="12">연납(1년)</option>
                    <option value="1">월납</option>
                </select>
                <div class="print-text"></div>
            </td>
            <td><input type="text" class="consumer-price input-num text-right" readonly placeholder="자동계산" oninput="formatCurrency(this)"></td>
            <td><input type="number" class="qty input-num" value="1" oninput="calcAll()" style="display: none; width: 100%;"></td>
            <td><input type="text" class="proposed-price input-num text-right" oninput="formatCurrency(this)" placeholder="직접입력"></td>
            <td><input type="text" class="row-total input-num text-right" readonly></td>
            <td><input type="text" class="row-vat input-num text-right" readonly></td>
            <td style="position:relative;">
                <input type="text" style="width: 100%; border: none; text-align: center;">
                <button class="btn-del" onclick="this.closest('tr').remove(); calcAll();" style="position:absolute; right:-25px; top:10px; background:red; color:white; border:none; border-radius:50%; cursor:pointer; width:20px; height:20px; font-size:10px;">X</button>
            </td>
        `;
        tbody.appendChild(tr);
        updateQuoteMessage(); 
        updateRemarksText();
    }

    function updateOptions(selectElem) {
        const tr = selectElem.closest('tr');
        const termSel = tr.querySelector('.term-sel');
        const qtyInput = tr.querySelector('.qty');
        const prodName = selectElem.value;
        
        const prodCustom = tr.querySelector('.product-custom');
        const termCustom = tr.querySelector('.term-custom');
        const consumerPrice = tr.querySelector('.consumer-price');

        termSel.innerHTML = '<option value="">-- 계약 기간 --</option>';

        if (prodName === 'direct') {
            selectElem.style.display = 'none'; 
            prodCustom.style.display = 'block';
            
            termSel.style.display = 'none';
            termCustom.style.display = 'block';
            
            qtyInput.style.display = 'inline-block';
            
            consumerPrice.removeAttribute('readonly');
            consumerPrice.placeholder = "단가 직접입력";
            
            consumerPrice.value = "";
            tr.querySelector('.proposed-price').value = "";
            tr.querySelector('.row-total').value = "";
            tr.querySelector('.row-vat').value = "";
            calcAll();
            return;
        }

        if(!prodName) {
            qtyInput.style.display = 'none';
            consumerPrice.value = "";
            tr.querySelector('.proposed-price').value = "";
            tr.querySelector('.row-total').value = "";
            tr.querySelector('.row-vat').value = "";
            calcAll();
            return;
        } else {
            qtyInput.style.display = 'inline-block';
        }

        const conditions = Object.keys(pricingDB[prodName].tiers[0].prices);
        conditions.forEach(cond => {
            termSel.innerHTML += `<option value="${cond}">${cond}</option>`;
        });

        if (conditions.length > 0) {
            termSel.value = conditions[0];
        }

        calcAll();
    }

    function formatCurrency(input) {
        let val = input.value.replace(/[^0-9]/g, '');
        if(val) { input.value = parseInt(val).toLocaleString(); } 
        else { input.value = ''; }
        calcAll();
    }

    function calcAll() {
        let grandVal = 0, grandVat = 0;
        const rows = document.querySelectorAll('#itemTable tbody tr');

        rows.forEach(tr => {
            const prodSel = tr.querySelector('.product-sel');
            const prodName = prodSel.value;
            const term = tr.querySelector('.term-sel').value;
            
            const billingVal = tr.querySelector('.billing-sel').value;
            const isLumpSum = (billingVal === 'lump');
            const billingMulti = parseInt(billingVal) || 1; // 연납, 월납 곱하기용
            
            const qty = parseInt(tr.querySelector('.qty').value) || 0;
            
            const proposedInput = tr.querySelector('.proposed-price').value.replace(/,/g, '');
            const proposedPrice = parseInt(proposedInput) || 0;

            let consumerPrice = 0;

            if (prodName === 'direct') {
                const cPriceInput = tr.querySelector('.consumer-price').value.replace(/,/g, '');
                consumerPrice = parseInt(cPriceInput) || 0;
            // 모든 필수 항목(서비스, 기간, 납부주기)이 선택되어야만 금액을 계산함
            } else if (prodName && term && billingVal !== "" && qty > 0) {
                const db = pricingDB[prodName];
                
                let tier = db.tiers.find(t => qty <= t.max);
                if(!tier) tier = db.tiers[db.tiers.length - 1];

                let basePrice = tier.prices[term] || 0;

                // 일시납인 경우 계약 약정 기간만큼 계산
                if (isLumpSum) {
                    let years = 1; // 무약정 및 1년약정의 기본값
                    if (term.includes('2년')) years = 2;
                    else if (term.includes('3년')) years = 3;
                    else if (term.includes('4년')) years = 4;
                    else if (term.includes('5년')) years = 5;

                    if (db.type === "monthly") {
                        if (term === '무약정') {
                            basePrice *= 1; // 월단위 무약정의 일시납은 기본 1개월로 반영
                        } else {
                            basePrice *= (years * 12);
                        }
                    } else if (db.type === "yearly") {
                        basePrice *= years;
                    }
                } else {
                    // 기존 연납 / 월납 로직
                    if(db.type === "monthly" && billingMulti === 12) basePrice *= 12;
                    if(db.type === "yearly" && billingMulti === 1) basePrice = Math.floor(basePrice / 12);
                }

                consumerPrice = basePrice;
            }

            const subTotal = proposedPrice * qty;
            const vat = Math.floor(subTotal * 0.1);

            if(prodName === 'direct') {
                if(consumerPrice > 0) {
                    tr.querySelector('.consumer-price').value = consumerPrice.toLocaleString();
                }
                tr.querySelector('.row-total').value = subTotal ? subTotal.toLocaleString() : "";
                tr.querySelector('.row-vat').value = vat ? vat.toLocaleString() : "";
            } else if(prodName) {
                tr.querySelector('.consumer-price').value = consumerPrice ? consumerPrice.toLocaleString() : "";
                tr.querySelector('.row-total').value = subTotal ? subTotal.toLocaleString() : "";
                tr.querySelector('.row-vat').value = vat ? vat.toLocaleString() : "";
            }

            const prodPrint = prodSel.parentElement.querySelector('.print-text');
            if (prodSel.value === 'direct') {
                prodPrint.innerText = tr.querySelector('.product-custom').value;
            } else if (prodSel.selectedIndex > 0) {
                prodPrint.innerText = prodSel.options[prodSel.selectedIndex].text;
            } else {
                prodPrint.innerText = "";
            }

            const termSel = tr.querySelector('.term-sel');
            const termPrint = termSel.parentElement.querySelector('.print-text');
            if (prodSel.value === 'direct') {
                termPrint.innerText = tr.querySelector('.term-custom').value;
            } else if (termSel.selectedIndex > 0) {
                termPrint.innerText = termSel.options[termSel.selectedIndex].text;
            } else {
                termPrint.innerText = "";
            }

            const billSel = tr.querySelector('.billing-sel');
            const billPrint = billSel.parentElement.querySelector('.print-text');
            if (billSel.value !== "" && billSel.selectedIndex >= 0) {
                billPrint.innerText = billSel.options[billSel.selectedIndex].text;
            } else {
                billPrint.innerText = "";
            }

            grandVal += subTotal;
            grandVat += vat;
        });

        const totalAmt = grandVal + grandVat;
        document.getElementById('numGrandTotal').innerText = totalAmt.toLocaleString();
        document.getElementById('txtGrandTotal').innerText = amtToKor(totalAmt);
        
        updateQuoteMessage(); 
        updateRemarksText(); 
    }

    function amtToKor(num) {
        if(num === 0) return "영";
        const kor = ["", "일", "이", "삼", "사", "오", "육", "칠", "팔", "구"];
        const unit = ["", "십", "백", "천"];
        const bigUnit = ["", "만", "억", "조"];
        let res = "", i = 0, n = num;
        while (n > 0) {
            let m = n % 10000, s = "", j = 0;
            while (m > 0) {
                let d = m % 10;
                if (d > 0) s = kor[d] + unit[j] + s;
                m = Math.floor(m / 10); j++;
            }
            if (s !== "") res = s + bigUnit[i] + res;
            n = Math.floor(n / 10000); i++;
        }
        return res;
    }
</script>
